<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🍅 小男孩的工具箱</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0f0f1a;
    --card-bg: #1a1a2e;
    --accent: #6c5ce7;
    --accent-light: #a29bfe;
    --pink: #fd79a8;
    --tomato: #e74c3c;
    --text: #f5f5f5;
    --text-dim: #999;
    --radius: 16px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* 浮动番茄 */
  .tomato-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .tomato-bg span {
    position: absolute;
    bottom: -30px;
    opacity: 0.08;
    animation: tomatoUp linear infinite;
  }
  @keyframes tomatoUp {
    0%   { transform: translateY(0) rotate(0deg); }
    100% { transform: translateY(-105vh) rotate(360deg); }
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 420px;
    margin: 0 auto;
    padding: 50px 20px 40px;
  }

  /* 头部 */
  .header {
    text-align: center;
    margin-bottom: 36px;
    animation: fadeUp 0.6s ease;
  }
  .header .logo {
    font-size: 3.5em;
    margin-bottom: 12px;
    animation: heartbeat 1.5s ease-in-out infinite;
  }
  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    15%      { transform: scale(1.1); }
    30%      { transform: scale(1); }
    45%      { transform: scale(1.05); }
  }
  .header h1 {
    font-size: 1.8em;
    margin-bottom: 6px;
    background: linear-gradient(135deg, var(--accent-light), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header .subtitle {
    color: var(--text-dim);
    font-size: 0.95em;
  }
  .header .days {
    margin-top: 16px;
    font-size: 0.9em;
    color: var(--pink);
  }
  .header .days span {
    font-size: 1.6em;
    font-weight: 800;
  }

  /* 工具网格 */
  .tools-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 28px;
  }
  .tool-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 24px 16px;
    text-align: center;
    text-decoration: none;
    color: var(--text);
    transition: transform 0.2s, box-shadow 0.2s;
    border: 1px solid rgba(255,255,255,0.05);
    animation: fadeUp 0.5s ease both;
  }
  .tool-card:nth-child(1) { animation-delay: 0.05s; }
  .tool-card:nth-child(2) { animation-delay: 0.1s; }
  .tool-card:nth-child(3) { animation-delay: 0.15s; }
  .tool-card:nth-child(4) { animation-delay: 0.2s; }
  .tool-card:nth-child(5) { animation-delay: 0.25s; }
  .tool-card:nth-child(6) { animation-delay: 0.3s; }
  .tool-card:active { transform: scale(0.95); }
  .tool-card .icon {
    font-size: 2.2em;
    margin-bottom: 10px;
    display: block;
  }
  .tool-card .name {
    font-size: 1em;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .tool-card .desc {
    font-size: 0.75em;
    color: var(--text-dim);
    line-height: 1.4;
  }
  .tool-card.highlight {
    grid-column: 1 / -1;
    background: linear-gradient(135deg, rgba(108,92,231,0.2), rgba(253,121,168,0.2));
    border-color: rgba(253,121,168,0.2);
  }

  /* 底部 */
  .footer {
    text-align: center;
    color: var(--text-dim);
    font-size: 0.8em;
    margin-top: 20px;
    animation: fadeUp 0.5s ease 0.4s both;
  }
  .footer .heart { color: var(--pink); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<!-- 浮动番茄背景 -->
<div class="tomato-bg" id="tomatoBg"></div>

<div class="container">
  <!-- 头部 -->
  <div class="header">
    <div class="logo">🍅</div>
    <h1>小男孩的工具箱</h1>
    <p class="subtitle">给晓帆的专属记忆空间</p>
    <div class="days">
      我们已经在一起 <span id="daysTogether">0</span> 天
    </div>
  </div>

  <!-- 工具网格 -->
  <div class="tools-grid">
    <a class="tool-card highlight" href="index.html">
      <span class="icon">💌</span>
      <div class="name">答题表白</div>
      <div class="desc">那个让她心动的答题游戏</div>
    </a>
    <a class="tool-card" href="memories.html">
      <span class="icon">📖</span>
      <div class="name">回忆录</div>
      <div class="desc">记录每个珍贵瞬间</div>
    </a>
    <a class="tool-card" href="anniversary.html">
      <span class="icon">📅</span>
      <div class="name">纪念日</div>
      <div class="desc">再也不会忘记重要日子</div>
    </a>
    <a class="tool-card" href="quotes.html">
      <span class="icon">💬</span>
      <div class="name">甜蜜语录</div>
      <div class="desc">收集她说过的每句甜话</div>
    </a>
    <a class="tool-card" href="bucket.html">
      <span class="icon">✅</span>
      <div class="name">愿望清单</div>
      <div class="desc">一起想做的事，逐个实现</div>
    </a>
    <a class="tool-card" href="diary.html">
      <span class="icon">📝</span>
      <div class="name">每日一句</div>
      <div class="desc">用一句话记录每一天</div>
    </a>
  </div>

  <div class="footer">
    Made with <span class="heart">❤️</span> by 你的小男孩 🍅
  </div>
</div>

<script>
// 在一起天数
(function() {
  const start = new Date("2026-05-31");
  const now = new Date();
  const days = Math.floor((now - start) / (1000 * 60 * 60 * 24));
  document.getElementById("daysTogether").textContent = days;
})();

// 浮动番茄
(function() {
  const bg = document.getElementById("tomatoBg");
  for (let i = 0; i < 10; i++) {
    const t = document.createElement("span");
    t.textContent = "🍅";
    t.style.left = Math.random() * 100 + "vw";
    t.style.fontSize = (Math.random() * 1 + 1) + "em";
    t.style.animationDuration = (Math.random() * 12 + 15) + "s";
    t.style.animationDelay = (Math.random() * 15) + "s";
    bg.appendChild(t);
  }
})();
</script>
</body>
</html>
