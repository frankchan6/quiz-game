<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🍅 我们的回忆</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0f0f1a;
    --card-bg: #1a1a2e;
    --accent: #6c5ce7;
    --accent-light: #a29bfe;
    --pink: #fd79a8;
    --tomato: #e74c3c;
    --text: #f5f5f5;
    --text-dim: #999;
    --radius: 16px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* ====== 头部 ====== */
  .header {
    text-align: center;
    padding: 50px 20px 30px;
    position: relative;
  }
  .header h1 {
    font-size: 1.8em;
    margin-bottom: 8px;
  }
  .header .subtitle {
    color: var(--text-dim);
    font-size: 0.95em;
  }
  .header .tomato-deco {
    position: absolute;
    font-size: 2em;
    opacity: 0.15;
    animation: tomatoSpin 8s linear infinite;
  }
  .header .tomato-deco:nth-child(1) { top: 20px; left: 20px; }
  .header .tomato-deco:nth-child(2) { top: 30px; right: 20px; animation-delay: -3s; }
  @keyframes tomatoSpin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* ====== 统计条 ====== */
  .stats {
    display: flex;
    justify-content: center;
    gap: 24px;
    padding: 16px 20px;
    margin: 0 20px 24px;
    background: var(--card-bg);
    border-radius: var(--radius);
  }
  .stat-item {
    text-align: center;
  }
  .stat-num {
    font-size: 1.8em;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent-light), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .stat-label {
    font-size: 0.8em;
    color: var(--text-dim);
    margin-top: 2px;
  }

  /* ====== 添加按钮 ====== */
  .fab {
    position: fixed;
    bottom: 30px;
    right: 20px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--pink), #e84393);
    border: none;
    color: #fff;
    font-size: 1.8em;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(253, 121, 168, 0.4);
    z-index: 50;
    transition: transform 0.2s;
  }
  .fab:active { transform: scale(0.9); }

  /* ====== 时间轴 ====== */
  .timeline {
    padding: 0 20px 100px;
    position: relative;
  }
  .timeline::before {
    content: "";
    position: absolute;
    left: 36px;
    top: 0;
    bottom: 0;
    width: 2px;
    background: linear-gradient(to bottom, var(--pink), var(--accent), transparent);
  }

  .memory-card {
    position: relative;
    margin-bottom: 28px;
    padding-left: 48px;
    animation: fadeUp 0.5s ease;
  }
  .memory-card::before {
    content: "🍅";
    position: absolute;
    left: 22px;
    top: 16px;
    font-size: 1.2em;
    z-index: 1;
  }
  .memory-content {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 20px;
    border: 1px solid rgba(255,255,255,0.05);
    transition: transform 0.2s;
  }
  .memory-content:active { transform: scale(0.98); }
  .memory-date {
    font-size: 0.8em;
    color: var(--pink);
    font-weight: 600;
    margin-bottom: 8px;
  }
  .memory-title {
    font-size: 1.15em;
    font-weight: 700;
    margin-bottom: 8px;
    line-height: 1.4;
  }
  .memory-text {
    font-size: 0.95em;
    color: rgba(255,255,255,0.75);
    line-height: 1.7;
    margin-bottom: 12px;
  }
  .memory-images {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 12px;
  }
  .memory-images img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.2s;
  }
  .memory-images img:active { transform: scale(0.95); }
  .memory-delete {
    position: absolute;
    top: 12px;
    right: 12px;
    background: rgba(255,255,255,0.1);
    border: none;
    color: var(--text-dim);
    width: 28px;
    height: 28px;
    border-radius: 50%;
    font-size: 0.85em;
    cursor: pointer;
    display: none;
  }
  .memory-content:hover .memory-delete,
  .memory-content:active .memory-delete { display: block; }

  /* ====== 添加弹窗 ====== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    justify-content: center;
    align-items: flex-end;
    backdrop-filter: blur(6px);
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--card-bg);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-width: 500px;
    max-height: 85vh;
    overflow-y: auto;
    padding: 24px 20px 40px;
    animation: slideUp 0.35s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .modal-handle {
    width: 40px;
    height: 4px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
    margin: 0 auto 20px;
  }
  .modal h2 {
    font-size: 1.3em;
    margin-bottom: 20px;
    text-align: center;
  }
  .form-group {
    margin-bottom: 18px;
  }
  .form-group label {
    display: block;
    font-size: 0.85em;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .form-group input,
  .form-group textarea {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--text);
    font-size: 1em;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }
  .form-group input:focus,
  .form-group textarea:focus {
    border-color: var(--pink);
  }
  .form-group textarea {
    min-height: 100px;
    resize: vertical;
  }

  .image-upload-area {
    border: 2px dashed rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s;
    color: var(--text-dim);
    font-size: 0.9em;
  }
  .image-upload-area:active { border-color: var(--pink); }
  .image-preview {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 12px;
  }
  .image-preview img {
    width: 70px;
    height: 70px;
    object-fit: cover;
    border-radius: 8px;
  }
  .image-preview .remove-img {
    position: relative;
    display: inline-block;
  }
  .image-preview .remove-img::after {
    content: "×";
    position: absolute;
    top: -6px;
    right: -6px;
    width: 20px;
    height: 20px;
    background: var(--tomato);
    color: #fff;
    border-radius: 50%;
    font-size: 0.75em;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .submit-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--pink), #e84393);
    border: none;
    border-radius: 50px;
    color: #fff;
    font-size: 1.1em;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s;
    margin-top: 8px;
  }
  .submit-btn:active { transform: scale(0.97); }

  /* ====== 图片预览弹窗 ====== */
  .img-viewer {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    z-index: 200;
    justify-content: center;
    align-items: center;
    cursor: pointer;
  }
  .img-viewer.active { display: flex; }
  .img-viewer img {
    max-width: 95%;
    max-height: 90vh;
    border-radius: 8px;
  }

  /* ====== 空状态 ====== */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }
  .empty-state .emoji { font-size: 3em; margin-bottom: 16px; }
  .empty-state p { font-size: 1em; line-height: 1.6; }

  /* ====== 数据管理 ====== */
  .data-actions {
    display: flex;
    gap: 10px;
    justify-content: center;
    padding: 0 20px 20px;
  }
  .data-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-dim);
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 0.8em;
    cursor: pointer;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ====== 底部导航 ====== */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(26,26,46,0.95);
    backdrop-filter: blur(12px);
    display: flex;
    justify-content: space-around;
    padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
    z-index: 60;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .bottom-nav a {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-decoration: none;
    color: var(--text-dim);
    font-size: 0.65em;
    padding: 4px 8px;
    transition: color 0.2s;
  }
  .bottom-nav a .nav-icon { font-size: 1.6em; margin-bottom: 2px; }
  .bottom-nav a.active { color: var(--pink); }
</style>
</head>
<body>

<!-- 头部 -->
<div class="header">
  <span class="tomato-deco">🍅</span>
  <span class="tomato-deco">🍅</span>
  <h1>🍅 我们的回忆</h1>
  <p class="subtitle">记录每一个值得记住的瞬间</p>
</div>

<!-- 统计 -->
<div class="stats">
  <div class="stat-item">
    <div class="stat-num" id="totalCount">0</div>
    <div class="stat-label">回忆</div>
  </div>
  <div class="stat-item">
    <div class="stat-num" id="daysCount">0</div>
    <div class="stat-label">天</div>
  </div>
  <div class="stat-item">
    <div class="stat-num" id="photoCount">0</div>
    <div class="stat-label">照片</div>
  </div>
</div>

<!-- 数据管理 -->
<div class="data-actions">
  <button class="data-btn" onclick="exportData()">📤 导出数据</button>
  <button class="data-btn" onclick="document.getElementById('importFile').click()">📥 导入数据</button>
  <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
</div>

<!-- 时间轴 -->
<div class="timeline" id="timeline"></div>

<!-- 添加按钮 -->
<button class="fab" onclick="openModal()">+</button>

<!-- 添加弹窗 -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>🍅 添加回忆</h2>
    <div class="form-group">
      <label>日期</label>
      <input type="date" id="memDate">
    </div>
    <div class="form-group">
      <label>标题</label>
      <input type="text" id="memTitle" placeholder="比如：第一次一起看电影">
    </div>
    <div class="form-group">
      <label>故事</label>
      <textarea id="memText" placeholder="写下这个瞬间的故事..."></textarea>
    </div>
    <div class="form-group">
      <label>照片（可选）</label>
      <div class="image-upload-area" onclick="document.getElementById('memImages').click()">
        📷 点击上传照片
      </div>
      <input type="file" id="memImages" accept="image/*" multiple style="display:none" onchange="previewImages(event)">
      <div class="image-preview" id="imagePreview"></div>
    </div>
    <button class="submit-btn" onclick="saveMemory()">保存回忆 🍅</button>
  </div>
</div>

<!-- 图片预览 -->
<div class="img-viewer" id="imgViewer" onclick="closeViewer()">
  <img id="viewerImg" src="" alt="">
</div>

<script>
const STORAGE_KEY = "our_memories";
const START_DATE = "2026-05-31"; // 在一起的日子
let uploadedImages = [];

// ========== 初始化 ==========
function init() {
  renderTimeline();
  updateStats();
  document.getElementById("memDate").value = new Date().toISOString().split("T")[0];
}

// ========== 数据操作 ==========
function getMemories() {
  return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
}

function saveMemories(memories) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(memories));
}

function saveMemory() {
  const date = document.getElementById("memDate").value;
  const title = document.getElementById("memTitle").value.trim();
  const text = document.getElementById("memText").value.trim();

  if (!date || !title) {
    alert("日期和标题不能为空哦 🍅");
    return;
  }

  const memories = getMemories();
  memories.unshift({
    id: Date.now(),
    date,
    title,
    text,
    images: [...uploadedImages]
  });

  // 按日期排序（最新的在前）
  memories.sort((a, b) => new Date(b.date) - new Date(a.date));
  saveMemories(memories);

  // 清空表单
  document.getElementById("memTitle").value = "";
  document.getElementById("memText").value = "";
  document.getElementById("imagePreview").innerHTML = "";
  uploadedImages = [];

  closeModal();
  renderTimeline();
  updateStats();
}

function deleteMemory(id) {
  if (!confirm("确定要删除这条回忆吗？")) return;
  const memories = getMemories().filter(m => m.id !== id);
  saveMemories(memories);
  renderTimeline();
  updateStats();
}

// ========== 渲染时间轴 ==========
function renderTimeline() {
  const memories = getMemories();
  const timeline = document.getElementById("timeline");

  if (memories.length === 0) {
    timeline.innerHTML = `
      <div class="empty-state">
        <div class="emoji">🍅</div>
        <p>还没有回忆哦<br>点击右下角 + 添加第一条吧</p>
      </div>
    `;
    return;
  }

  timeline.innerHTML = memories.map(m => `
    <div class="memory-card">
      <button class="memory-delete" onclick="deleteMemory(${m.id})">×</button>
      <div class="memory-content">
        <div class="memory-date">${formatDate(m.date)}</div>
        <div class="memory-title">${escapeHtml(m.title)}</div>
        ${m.text ? `<div class="memory-text">${escapeHtml(m.text)}</div>` : ""}
        ${m.images && m.images.length > 0 ? `
          <div class="memory-images">
            ${m.images.map(img => `<img src="${img}" onclick="viewImage('${img}')" loading="lazy">`).join("")}
          </div>
        ` : ""}
      </div>
    </div>
  `).join("");
}

// ========== 统计 ==========
function updateStats() {
  const memories = getMemories();
  const photos = memories.reduce((sum, m) => sum + (m.images ? m.images.length : 0), 0);
  const today = new Date();
  const start = new Date(START_DATE);
  const days = Math.floor((today - start) / (1000 * 60 * 60 * 24));

  document.getElementById("totalCount").textContent = memories.length;
  document.getElementById("daysCount").textContent = days;
  document.getElementById("photoCount").textContent = photos;
}

// ========== 图片处理 ==========
function previewImages(event) {
  const files = event.target.files;
  const preview = document.getElementById("imagePreview");

  Array.from(files).forEach(file => {
    if (uploadedImages.length >= 9) {
      alert("最多上传 9 张照片哦");
      return;
    }

    const reader = new FileReader();
    reader.onload = (e) => {
      // 压缩图片
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        const maxSize = 800;
        let w = img.width, h = img.height;
        if (w > maxSize || h > maxSize) {
          if (w > h) { h = h * maxSize / w; w = maxSize; }
          else { w = w * maxSize / h; h = maxSize; }
        }
        canvas.width = w;
        canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        const compressed = canvas.toDataURL("image/jpeg", 0.7);
        uploadedImages.push(compressed);
        renderPreview();
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });

  event.target.value = "";
}

function renderPreview() {
  const preview = document.getElementById("imagePreview");
  preview.innerHTML = uploadedImages.map((img, i) => `
    <div class="remove-img" onclick="removeImage(${i})">
      <img src="${img}">
    </div>
  `).join("");
}

function removeImage(idx) {
  uploadedImages.splice(idx, 1);
  renderPreview();
}

function viewImage(src) {
  document.getElementById("viewerImg").src = src;
  document.getElementById("imgViewer").classList.add("active");
}

function closeViewer() {
  document.getElementById("imgViewer").classList.remove("active");
}

// ========== 弹窗控制 ==========
function openModal() {
  uploadedImages = [];
  document.getElementById("imagePreview").innerHTML = "";
  document.getElementById("modalOverlay").classList.add("active");
}

function closeModal() {
  document.getElementById("modalOverlay").classList.remove("active");
}

function closeModalOutside(e) {
  if (e.target === e.currentTarget) closeModal();
}

// ========== 导入导出 ==========
function exportData() {
  const memories = getMemories();
  const blob = new Blob([JSON.stringify(memories, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `我们的回忆_${new Date().toISOString().split("T")[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!Array.isArray(imported)) throw new Error();

      const existing = getMemories();
      const merged = [...existing, ...imported];
      // 去重
      const unique = merged.filter((m, i, arr) => arr.findIndex(x => x.id === m.id) === i);
      unique.sort((a, b) => new Date(b.date) - new Date(a.date));

      saveMemories(unique);
      renderTimeline();
      updateStats();
      alert(`成功导入 ${imported.length} 条回忆 🍅`);
    } catch {
      alert("文件格式不对哦");
    }
  };
  reader.readAsText(file);
  event.target.value = "";
}

// ========== 工具函数 ==========
function formatDate(dateStr) {
  const d = new Date(dateStr);
  const weekdays = ["周日", "周一", "周二", "周三", "周四", "周五", "周六"];
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")} ${weekdays[d.getDay()]}`;
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

// 启动
init();
</script>

<nav class="bottom-nav">
  <a href="hub.html"><span class="nav-icon">🏠</span>首页</a>
  <a href="memories.html" class="active"><span class="nav-icon">📖</span>回忆</a>

  <a href="bucket.html"><span class="nav-icon">✅</span>愿望</a>
  <a href="diary.html"><span class="nav-icon">📝</span>日记</a>
</nav>

</body>
</html>
